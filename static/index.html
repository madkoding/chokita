<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chokita</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/quicksand@latest/latin-400-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/quicksand@latest/latin-600-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/quicksand@latest/latin-700-normal.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1033 0%, #2d1b4e 40%, #4a2574 100%);
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    padding: 10px 0 20px;
  }
  .header h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff9ec7, #c79eff, #9ec7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 4px;
  }

  .cat-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 400px;
  }

  .cat-glow {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(199, 158, 255, 0.3) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(40px);
    animation: pulseGlow 4s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 0.9; }
  }

  .thought-bubble {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-30%);
    background: rgba(255, 255, 255, 0.95);
    border-radius: 30px;
    padding: 20px 28px;
    max-width: 320px;
    min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.05);
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
    z-index: 10;
  }
  .thought-bubble.visible {
    opacity: 1;
    transform: translateX(-30%) translateY(0);
  }
  .thought-bubble::before,
  .thought-bubble::after {
    content: '';
    position: absolute;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
  }
  .thought-bubble::before {
    width: 20px;
    height: 20px;
    bottom: -10px;
    left: 40px;
  }
  .thought-bubble::after {
    width: 12px;
    height: 12px;
    bottom: -28px;
    left: 28px;
  }
  .thought-text {
    color: #2d1b4e;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
  }
  .thinking-dots {
    display: inline-flex;
    gap: 4px;
  }
  .thinking-dots span {
    width: 8px;
    height: 8px;
    background: #7c4dff;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-10px); opacity: 1; }
  }

  .speech-bubble {
    position: absolute;
    top: 30px;
    right: 10%;
    background: linear-gradient(135deg, #ff9ec7 0%, #c79eff 100%);
    border-radius: 25px;
    padding: 20px 28px;
    max-width: 320px;
    min-width: 180px;
    box-shadow: 0 10px 40px rgba(199, 158, 255, 0.4);
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
    z-index: 10;
    transform: scale(0.8);
  }
  .speech-bubble.visible {
    opacity: 1;
    transform: scale(1);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -15px;
    left: 40px;
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 20px solid #c79eff;
  }
  .speech-text {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  .cat-svg {
    width: 280px;
    height: 280px;
    position: relative;
    z-index: 5;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
  }

  .cat-tail {
    transform-origin: 140px 200px;
    animation: tailWag 2s ease-in-out infinite;
  }
  @keyframes tailWag {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(10deg); }
  }

  .cat-ear-left, .cat-ear-right {
    transform-origin: center bottom;
  }
  .cat-ear-left { animation: earTwitchL 5s ease-in-out infinite; }
  .cat-ear-right { animation: earTwitchR 5s ease-in-out infinite; }
  @keyframes earTwitchL {
    0%, 90%, 100% { transform: rotate(0); }
    93% { transform: rotate(-8deg); }
    96% { transform: rotate(0); }
  }
  @keyframes earTwitchR {
    0%, 85%, 100% { transform: rotate(0); }
    88% { transform: rotate(8deg); }
    91% { transform: rotate(0); }
  }

  .cat-eyes {
    animation: blink 4s infinite;
    transform-origin: center;
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    94%, 96% { transform: scaleY(0.1); }
  }

  .cat-thinking .cat-eyes {
    animation: none;
    transform: scaleY(0.3);
    transition: transform 0.3s;
  }

  .bottom-panel {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  .vu-meter-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .vu-label {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 50px;
  }
  .vu-meter {
    flex: 1;
    display: flex;
    gap: 3px;
    height: 20px;
    align-items: center;
  }
  .vu-bar {
    flex: 1;
    height: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.05s;
  }
  .vu-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    background: linear-gradient(to top, #4ade80, #facc15, #ef4444);
    border-radius: 2px;
    transition: height 0.05s linear;
  }
  .vu-db {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-weight: 600;
    min-width: 45px;
    text-align: right;
    font-family: monospace;
  }

  .context-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .context-label {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 70px;
  }
  .context-bar {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .context-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #9ec7ff, #c79eff, #ff9ec7);
    border-radius: 10px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(199, 158, 255, 0.5);
  }
  .context-percent {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-wrapper {
    flex: 1;
    position: relative;
  }
  .text-input {
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    color: #fff;
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: all 0.3s;
  }
  .text-input::placeholder {
    color: rgba(255,255,255,0.4);
  }
  .text-input:focus {
    background: rgba(255,255,255,0.15);
    border-color: rgba(199, 158, 255, 0.6);
    box-shadow: 0 0 20px rgba(199, 158, 255, 0.2);
  }

  .btn {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .btn-mic {
    background: linear-gradient(135deg, #ff6b9d 0%, #c79eff 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
  }
  .btn-mic:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
  }
  .btn-mic.active {
    background: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
    box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
  }
  .btn-mic.recording {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
  }

  .btn-send {
    background: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
  }
  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6);
  }
  .btn-send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-stop {
    display: none;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
  }
  .btn-stop:hover { transform: translateY(-2px); }

  .btn svg {
    width: 22px;
    height: 22px;
  }

  .chat-log {
    max-height: 0;
    overflow-y: auto;
    transition: max-height 0.3s ease;
    margin: 0 auto;
    width: 100%;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .chat-log.has-msgs {
    max-height: 120px;
    padding: 4px 0;
  }
  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .msg { padding: 3px 10px; font-size: 13px; line-height: 1.4; }
  .msg.user { color: rgba(255,255,255,0.5); text-align: right; }
  .msg.assistant { color: rgba(255,255,255,0.7); }
  .msg.system { text-align: center; font-style: italic; color: rgba(255,255,255,0.2); font-size: 12px; }
  .msg.error { text-align: center; color: #ff6b8a; font-weight: 600; }
  .msg.log { text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #1a1033;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.5s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.05); border-top-color: #c79eff; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: rgba(255,255,255,0.3); font-size: 14px; }

  #settings-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  #settings-modal.open { display: flex; }
  #settings-content {
    background: rgba(30, 15, 50, 0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 28px; width: 360px;
    backdrop-filter: blur(20px);
  }
  #settings-content h2 { margin-bottom: 20px; font-size: 18px; color: rgba(255,255,255,0.8); font-weight: 600; }
  #settings-btn {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.3);
    padding: 8px 12px; border-radius: 12px;
    transition: all 0.2s; line-height: 1;
  }
  #settings-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  .setting-row { margin-bottom: 18px; }
  .setting-row label { display: block; font-size: 13px; margin-bottom: 4px; color: rgba(255,255,255,0.5); }
  .setting-row input[type=range] { width: 100%; accent-color: #c79eff; }
  .setting-value { font-family: monospace; color: #c79eff; font-size: 13px; }
  .setting-row small { display: block; font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 2px; }
  #settings-close {
    width: 100%; padding: 12px; border: none; border-radius: 14px;
    background: rgba(199, 158, 255, 0.15); color: rgba(255,255,255,0.6);
    font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
  }
  #settings-close:hover { background: rgba(199, 158, 255, 0.25); }
  .setting-row input[type=checkbox] { accent-color: #c79eff; margin-right: 6px; }

  @media (max-width: 600px) {
    .cat-svg { width: 220px; height: 220px; }
    .thought-bubble, .speech-bubble { max-width: 240px; font-size: 13px; padding: 14px 18px; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <h1>✨ chokita ✨</h1>
    <p>Tu gatita virtual te escucha</p>
  </div>

  <div class="cat-area">
    <div class="cat-glow"></div>

    <div class="thought-bubble" id="thoughtBubble">
      <div class="thought-text" id="thoughtText">
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="speech-bubble" id="speechBubble">
      <div class="speech-text" id="speechText">¡Miau! ¿Cómo estás hoy?</div>
    </div>

    <!-- SVG Gatita -->
    <svg class="cat-svg" id="catSvg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="headGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="eyeGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#d9f99d"/>
          <stop offset="100%" stop-color="#65a30d"/>
        </radialGradient>
      </defs>

      <g class="cat-tail">
        <path d="M 200 200 Q 250 180 255 140 Q 258 110 240 100" stroke="#1a1a1a" stroke-width="18" fill="none" stroke-linecap="round"/>
        <path d="M 200 200 Q 250 180 255 140 Q 258 110 240 100" stroke="#2a2a2a" stroke-width="14" fill="none" stroke-linecap="round"/>
      </g>

      <g class="cat-body">
        <ellipse cx="140" cy="200" rx="75" ry="70" fill="#1a1a1a"/>
        <ellipse cx="140" cy="200" rx="75" ry="70" fill="url(#bodyGrad)"/>

        <circle cx="140" cy="130" r="65" fill="#1a1a1a"/>
        <circle cx="140" cy="130" r="65" fill="url(#headGrad)"/>

        <g class="cat-ear-left">
          <path d="M 90 90 L 75 40 L 115 75 Z" fill="#1a1a1a"/>
          <path d="M 92 85 L 82 50 L 110 75 Z" fill="#ff9ec7" opacity="0.6"/>
        </g>
        <g class="cat-ear-right">
          <path d="M 190 90 L 205 40 L 165 75 Z" fill="#1a1a1a"/>
          <path d="M 188 85 L 198 50 L 170 75 Z" fill="#ff9ec7" opacity="0.6"/>
        </g>

        <g class="cat-eyes">
          <ellipse cx="115" cy="130" rx="13" ry="16" fill="#a3e635"/>
          <ellipse cx="165" cy="130" rx="13" ry="16" fill="#a3e635"/>
          <ellipse cx="115" cy="130" rx="13" ry="16" fill="url(#eyeGrad)"/>
          <ellipse cx="165" cy="130" rx="13" ry="16" fill="url(#eyeGrad)"/>
          <ellipse cx="115" cy="130" rx="4" ry="13" fill="#000"/>
          <ellipse cx="165" cy="130" rx="4" ry="13" fill="#000"/>
          <circle cx="118" cy="125" r="3" fill="#fff"/>
          <circle cx="168" cy="125" r="3" fill="#fff"/>
          <circle cx="113" cy="135" r="1.5" fill="#fff" opacity="0.7"/>
          <circle cx="163" cy="135" r="1.5" fill="#fff" opacity="0.7"/>
        </g>

        <path d="M 135 150 L 145 150 L 140 157 Z" fill="#ff9ec7"/>
        <path d="M 140 157 Q 135 165 128 163" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 140 157 Q 145 165 152 163" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>

        <line x1="95" y1="150" x2="65" y2="145" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="95" y1="155" x2="65" y2="158" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="95" y1="160" x2="65" y2="168" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="185" y1="150" x2="215" y2="145" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="185" y1="155" x2="215" y2="158" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="185" y1="160" x2="215" y2="168" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

        <circle cx="100" cy="155" r="8" fill="#ff9ec7" opacity="0.3"/>
        <circle cx="180" cy="155" r="8" fill="#ff9ec7" opacity="0.3"/>

        <path d="M 90 175 Q 140 195 190 175" stroke="#c79eff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="140" cy="188" r="6" fill="#ffd700" stroke="#b8860b" stroke-width="1"/>
        <circle cx="140" cy="188" r="2" fill="#b8860b"/>
      </g>
    </svg>
  </div>

  <div class="chat-log" id="chatLog"></div>

  <div class="bottom-panel">
    <div class="vu-meter-section">
      <div class="vu-label">VU</div>
      <div class="vu-meter" id="vuMeter"></div>
      <div class="vu-db" id="vuDb">-∞ dB</div>
    </div>

    <div class="context-section">
      <div class="context-label">Contexto</div>
      <div class="context-bar">
        <div class="context-fill" id="contextFill"></div>
      </div>
      <div class="context-percent" id="contextPercent">0%</div>
    </div>

    <div class="input-row">
      <div class="input-wrapper">
        <input type="text" class="text-input" id="textInput" placeholder="Escribe algo a tu gatita..." autocomplete="off"/>
      </div>
      <button class="btn btn-mic" id="micBtn" title="Grabar audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="btn btn-stop" id="stopBtn" title="Detener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
      <button class="btn btn-send" id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div id="loading-text">Conectando...</div>
</div>

<button id="settings-btn" title="Ajustes">⚙</button>

<div id="settings-modal">
  <div id="settings-content">
    <h2>Ajustes de voz</h2>
    <div class="setting-row">
      <label>Sensibilidad: <span id="threshold-val" class="setting-value">0.010</span></label>
      <input type="range" id="threshold-slider" min="0.001" max="0.10" step="0.001" value="0.010">
      <small>Más bajo = detecta sonidos más suaves</small>
    </div>
    <div class="setting-row">
      <label>Ganancia: <span id="gain-val" class="setting-value">2.0</span>×</label>
      <input type="range" id="gain-slider" min="1" max="10" step="0.5" value="2.0">
      <small>Amplifica el audio antes de detectar voz</small>
    </div>
    <div class="setting-row">
      <label>Silencio para enviar: <span id="silence-val" class="setting-value">1000</span>ms</label>
      <input type="range" id="silence-slider" min="300" max="2000" step="100" value="1000">
      <small>Tiempo de silencio antes de enviar lo que dijiste</small>
    </div>
    <div class="setting-row">
      <label><input type="checkbox" id="autosend-check" checked> Auto-enviar al dejar de hablar</label>
    </div>
    <button id="settings-close">Cerrar</button>
  </div>
</div>

<script>
// --- Stars ---
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// --- VU bars ---
(function() {
  const m = document.getElementById('vuMeter');
  for (let i = 0; i < 20; i++) {
    const bar = document.createElement('div');
    bar.className = 'vu-bar';
    const fill = document.createElement('div');
    fill.className = 'vu-bar-fill';
    bar.appendChild(fill);
    m.appendChild(bar);
  }
})();

// --- DOM refs ---
const thoughtBubble = document.getElementById('thoughtBubble');
const thoughtText = document.getElementById('thoughtText');
const speechBubble = document.getElementById('speechBubble');
const speechText = document.getElementById('speechText');
const catSvg = document.getElementById('catSvg');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const micBtn = document.getElementById('micBtn');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');
const contextFill = document.getElementById('contextFill');
const contextPercent = document.getElementById('contextPercent');
const vuDb = document.getElementById('vuDb');
const vuFills = document.querySelectorAll('.vu-bar-fill');
const chatLog = document.getElementById('chatLog');

// --- State ---
let ws = null;
let currentState = 'IDLE';
let micStream = null;
let audioCtx = null;
let isMicActive = false;
let wsReconnectTimer = null;
let voiceTimer = null;
let vuAnimId = null;
let vuAnalyser = null;
let gainNode = null;
let ttsAudio = null;
let thinkingText = '';
let responseText = '';

// VAD
let vadState = 'idle';
let vadSilenceStart = 0;
let vadSpeakingStart = 0;
let audioBuffer = [];
const MAX_UTTERANCE_SAMPLES = 240000;
let noiseFloor = 0.005;
let noiseFloorFrames = 0;
const NOISE_FLOOR_DECAY = 0.02;

// Settings
let settings = {
  vadThreshold: 0.010,
  gain: 2.0,
  silenceMs: 1000,
  autoSendVoice: true,
};

function loadSettings() {
  try {
    const saved = localStorage.getItem('chokita.settings');
    if (saved) Object.assign(settings, JSON.parse(saved));
  } catch (_) {}
}
function saveSettings() {
  try { localStorage.setItem('chokita.settings', JSON.stringify(settings)); } catch (_) {}
}
loadSettings();

// --- WebSocket ---
function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  };
  ws.onmessage = (e) => {
    try { handleEvent(JSON.parse(e.data)); } catch(_) {}
  };
  ws.onclose = () => {
    wsReconnectTimer = setTimeout(connectWs, 1000);
  };
  ws.onerror = () => { ws.close(); };
}

function handleEvent(event) {
  const t = event.type;
  if (t === 'state') {
    setState(event.state, event.message || '');
    if (event.state === 'IDLE' || event.state === 'LISTENING') {
      loadingOverlay.classList.add('hidden');
    }
  } else if (t === 'tokens') {
    updateTokenBar(event.used || 0, event.total || 1);
  } else if (t === 'log') {
    addMsg(event.message, 'log');
  } else if (t === 'thinking_chunk') {
    if (!thinkingText) thoughtBubble.classList.add('visible');
    thinkingText += event.content || '';
    thoughtText.innerHTML = thinkingText;
    thoughtText.scrollTop = thoughtText.scrollHeight;
  } else if (t === 'response_chunk') {
    if (!responseText) speechBubble.classList.add('visible');
    responseText += event.content || '';
    speechText.textContent = responseText;
  } else if (t === 'thinking') {
    if (event.content) {
      thinkingText = event.content;
      if (thinkingText) thoughtBubble.classList.add('visible');
      thoughtText.textContent = thinkingText;
    }
  } else if (t === 'response') {
    if (event.content) {
      responseText = event.content;
      speechText.textContent = responseText;
    }
  } else if (t === 'audio_level') {
    updateVu(event.level || 0);
  } else if (t === 'voice_input') {
    if (event.text) {
      textInput.value = event.text;
      textInput.dispatchEvent(new Event('input'));
      if (voiceTimer) clearTimeout(voiceTimer);
      voiceTimer = setTimeout(() => {
        voiceTimer = null;
        if (textInput.value.trim()) sendText();
      }, 1500);
    }
  } else if (t === 'audio') {
    playTtsAudio(event.data);
  } else if (t === 'shutdown') {
    addMsg('Servidor desconectado.', 'error');
  }
}

// --- State ---
function setState(state, msg) {
  if (state === 'THINKING') {
    thinkingText = '';
    responseText = '';
    thoughtText.textContent = '';
    speechText.textContent = '';
    thoughtBubble.classList.add('visible');
    speechBubble.classList.remove('visible');
    catSvg.classList.add('cat-thinking');
  }
  if (state === 'SPEAKING') {
    speechBubble.classList.add('visible');
    thoughtBubble.classList.remove('visible');
    catSvg.classList.remove('cat-thinking');
  }
  if (state === 'IDLE' || state === 'LISTENING') {
    thoughtBubble.classList.remove('visible');
    catSvg.classList.remove('cat-thinking');
  }
  currentState = state;
  stopBtn.style.display = (state === 'THINKING' || state === 'SPEAKING') ? '' : 'none';
  if (state === 'ERROR') addMsg('⚠ ' + msg, 'error');
}

function updateTokenBar(used, total) {
  const pct = total ? (used / total * 100) : 0;
  contextFill.style.width = Math.min(pct, 100) + '%';
  contextPercent.textContent = Math.round(pct) + '%';
}

function updateVu(level) {
  const displayLevel = Math.sqrt(Math.min(level, 1));
  const nBars = vuFills.length;
  const filled = Math.round(displayLevel * nBars);
  for (let i = 0; i < nBars; i++) {
    const pct = (i + 1) / nBars;
    vuFills[i].style.height = (Math.min(pct, displayLevel) * 100) + '%';
  }
  const db = level > 0 ? (20 * Math.log10(level)).toFixed(1) : '-∞';
  vuDb.textContent = db + ' dB';
}

function addMsg(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  chatLog.appendChild(el);
  chatLog.classList.add('has-msgs');
  chatLog.scrollTop = chatLog.scrollHeight;
}

// --- TTS ---
function playTtsAudio(base64Wav) {
  try {
    if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
    const binary = atob(base64Wav);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    ttsAudio = new Audio(url);
    ttsAudio.onended = () => { URL.revokeObjectURL(url); ttsAudio = null; };
    ttsAudio.play().catch(() => {});
  } catch(e) {
    console.error('TTS playback error:', e);
  }
}

// --- Utterance ---
function trimSilence(samples, threshold) {
  const t = threshold || 200;
  let start = 0, end = samples.length;
  while (start < end && Math.abs(samples[start]) < t) start++;
  while (end > start && Math.abs(samples[end-1]) < t) end--;
  if (end - start < 1600) return null;
  return samples.slice(start, end);
}

function sendUtterance() {
  if (audioBuffer.length === 0) return;
  let totalLen = 0;
  for (const chunk of audioBuffer) totalLen += chunk.length;
  const combined = new Int16Array(totalLen);
  let offset = 0;
  for (const chunk of audioBuffer) {
    combined.set(chunk, offset);
    offset += chunk.length;
  }
  audioBuffer = [];
  const trimmed = trimSilence(combined);
  if (!trimmed) return;
  const bytes = new Uint8Array(trimmed.buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++)
    binary += String.fromCharCode(bytes[i]);
  const b64 = btoa(binary);
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type: 'audio_utterance', data: b64}));
}

// --- Send / Stop ---
function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type: 'text', text}));
  textInput.value = '';
}

function sendStop() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type: 'stop'}));
  if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
}

// --- Mic ---
function toggleMic() {
  if (isMicActive) { stopMic(); return; }
  startMic();
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: false, noiseSuppression: false }
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const source = audioCtx.createMediaStreamSource(micStream);

    gainNode = audioCtx.createGain();
    gainNode.gain.value = settings.gain;

    const notch = audioCtx.createBiquadFilter();
    notch.type = 'notch';
    notch.frequency.value = 50;
    notch.Q.value = 3;

    source.connect(notch);
    notch.connect(gainNode);

    vuAnalyser = audioCtx.createAnalyser();
    vuAnalyser.fftSize = 256;
    gainNode.connect(vuAnalyser);
    const vuData = new Uint8Array(vuAnalyser.frequencyBinCount);
    function vuLoop() {
      if (!vuAnalyser) return;
      vuAnalyser.getByteTimeDomainData(vuData);
      let sum = 0;
      for (let i = 0; i < vuData.length; i++) {
        const v = (vuData[i] - 128) / 128;
        sum += v * v;
      }
      const rms = Math.sqrt(sum / vuData.length);
      updateVu(rms);

      noiseFloorFrames++;
      if (rms < noiseFloor) {
        noiseFloor = rms;
        noiseFloorFrames = 0;
      } else if (noiseFloorFrames > 300) {
        noiseFloor = Math.min(noiseFloor * (1 + NOISE_FLOOR_DECAY), rms * 0.9);
        noiseFloorFrames = 0;
      }

      const enterThreshold = Math.max(noiseFloor * 2.5, noiseFloor + 0.020);
      const exitThreshold  = Math.max(noiseFloor * 1.5, noiseFloor + 0.008);

      if (vadState === 'idle' && rms > enterThreshold) {
        vadState = 'speaking';
        vadSpeakingStart = Date.now();
        micBtn.classList.add('recording');
      }
      if (vadState === 'speaking') {
        if (rms > exitThreshold) {
          vadSilenceStart = 0;
        } else {
          const now = Date.now();
          if (vadSilenceStart === 0) vadSilenceStart = now;
          if (now - vadSilenceStart > settings.silenceMs) {
            vadState = 'idle';
            micBtn.classList.remove('recording');
            if (audioBuffer.length > 0) sendUtterance();
          }
        }
        if (Date.now() - vadSpeakingStart > 15000) {
          vadState = 'idle';
          micBtn.classList.remove('recording');
          if (audioBuffer.length > 0) sendUtterance();
        }
      }

      vuAnimId = requestAnimationFrame(vuLoop);
    }
    vuLoop();

    const scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
    gainNode.connect(scriptNode);
    scriptNode.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const int16 = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      if (vadState === 'speaking') {
        audioBuffer.push(int16);
        if (audioBuffer.length * 4096 > MAX_UTTERANCE_SAMPLES)
          audioBuffer.shift();
      }
    };

    isMicActive = true;
    micBtn.classList.add('active');
    micBtn.title = 'Micrófono activo';
  } catch(e) {
    addMsg('❌ Error al acceder al micrófono: ' + e.message, 'error');
  }
}

function stopMic() {
  if (vuAnimId) { cancelAnimationFrame(vuAnimId); vuAnimId = null; }
  vuAnalyser = null;
  gainNode = null;
  vadState = 'idle';
  vadSilenceStart = 0;
  audioBuffer = [];
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  isMicActive = false;
  micBtn.classList.remove('active', 'recording');
  micBtn.title = 'Micrófono';
}

// --- Input ---
textInput.addEventListener('input', () => {
  if (voiceTimer) { clearTimeout(voiceTimer); voiceTimer = null; }
});

// --- Settings ---
const settingsModal = document.getElementById('settings-modal');
const settingsBtn = document.getElementById('settings-btn');
const settingsClose = document.getElementById('settings-close');
const thresholdSlider = document.getElementById('threshold-slider');
const thresholdVal = document.getElementById('threshold-val');
const gainSlider = document.getElementById('gain-slider');
const gainVal = document.getElementById('gain-val');
const silenceSlider = document.getElementById('silence-slider');
const silenceVal = document.getElementById('silence-val');
const autosendCheck = document.getElementById('autosend-check');

function applySettingsToUI() {
  thresholdSlider.value = settings.vadThreshold;
  thresholdVal.textContent = settings.vadThreshold.toFixed(3);
  gainSlider.value = settings.gain;
  gainVal.textContent = settings.gain.toFixed(1);
  silenceSlider.value = settings.silenceMs;
  silenceVal.textContent = settings.silenceMs;
  autosendCheck.checked = settings.autoSendVoice;
  if (gainNode) gainNode.gain.value = settings.gain;
}
applySettingsToUI();

settingsBtn.addEventListener('click', () => settingsModal.classList.add('open'));
settingsClose.addEventListener('click', () => settingsModal.classList.remove('open'));
settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) settingsModal.classList.remove('open');
});

thresholdSlider.addEventListener('input', () => {
  settings.vadThreshold = parseFloat(thresholdSlider.value);
  thresholdVal.textContent = settings.vadThreshold.toFixed(3);
  saveSettings();
});
gainSlider.addEventListener('input', () => {
  settings.gain = parseFloat(gainSlider.value);
  gainVal.textContent = settings.gain.toFixed(1);
  if (gainNode) gainNode.gain.value = settings.gain;
  saveSettings();
});
silenceSlider.addEventListener('input', () => {
  settings.silenceMs = parseInt(silenceSlider.value);
  silenceVal.textContent = settings.silenceMs;
  saveSettings();
});
autosendCheck.addEventListener('change', () => {
  settings.autoSendVoice = autosendCheck.checked;
  saveSettings();
});

// --- Events ---
sendBtn.addEventListener('click', sendText);
stopBtn.addEventListener('click', sendStop);
micBtn.addEventListener('click', toggleMic);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

// --- Connect ---
connectWs();
</script>
</body>
</html>
